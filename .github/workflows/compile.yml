name: Compile LaTeX

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  # Allow manual runs from the Actions tab
  workflow_dispatch:

permissions:
  contents: write  # needed to create/update the "latest" release

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compile thesis.tex
        uses: xu-cheng/latex-action@v3
        with:
          root_file: thesis.tex
          # latexmk handles biber/biblatex re-runs automatically
          args: -pdf -interaction=nonstopmode -file-line-error

      - name: Compile expose.tex
        uses: xu-cheng/latex-action@v3
        with:
          root_file: expose.tex
          args: -pdf -interaction=nonstopmode -file-line-error

      - name: Upload compiled PDFs as artifact
        uses: actions/upload-artifact@v4
        with:
          name: compiled-pdfs
          path: "*.pdf"
          retention-days: 365

      # Publish PDFs to a rolling "latest" release so they can be downloaded
      # without a GitHub login. Only runs on direct pushes to main/master,
      # not on pull requests.
      - name: Publish to "latest" release
        if: github.event_name != 'pull_request'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest compiled PDFs
          body: "PDFs compiled automatically from the latest commit on `main`."
          prerelease: true
          files: "*.pdf"
