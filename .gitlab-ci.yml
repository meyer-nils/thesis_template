compile_thesis:
  stage: build
  image: arkark/latexmk:full
  script:
    - rm /root/.latexmkrc
    - latexmk -pdf -f thesis.tex
  tags:
    - latex
  artifacts:
    paths:
      - ./*.pdf
      - ./*.log
    expire_in: 2 years

compile_expose:
  stage: build
  image: arkark/latexmk:full
  script:
    - rm /root/.latexmkrc
    - latexmk -pdf -f expose.tex
  tags:
    - latex
  artifacts:
    paths:
      - ./*.pdf
      - ./*.log
    expire_in: 1 day